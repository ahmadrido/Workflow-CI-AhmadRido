name: Build and Push ML Model to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install MLflow and Dependencies
        run: |
          pip install mlflow pandas scikit-learn matplotlib seaborn

      - name: Run Model Training
        run: |
          cd MLProject # Diubah, tidak perlu pakai Workflow-CI lagi
          python modelling.py

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image using MLflow
        run: |
          cd MLProject # Diubah
          mlflow models build-docker -m model_dir -n ${{ secrets.DOCKERHUB_USERNAME }}/obesity-ml-model:latest

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/obesity-ml-model:latest